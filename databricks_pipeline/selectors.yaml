version: 2
# SISU (login.databricks.com) flow — updated after 2026-07 DOM probe
signup:
  email_inputs:
    - "input[name=email]"
    - "input[type=email]"
    - "input[placeholder=Email]"
  password_inputs:
    - "input[type=password]"
    - "input[name=password]"
  first_name:
    - "input[name=firstName]"
    - "input[name=first_name]"
  last_name:
    - "input[name=lastName]"
    - "input[name=last_name]"
  continue_email_texts:
    - "Continue with email"
    - "Continue"
  submit_texts:
    - "Continue"
    - "Create account"
    - "Sign up"
    - "Get started"
    - "Next"
  express_texts:
    - "Express"
  # select-product page (2026-07 SISU): two product buttons
  product_trial_texts:
    - "Start trial with express setup"
    - "Start trial"
    - "Start your free trial"
  product_free_texts:
    - "Get Free Edition"
    - "Free Edition"
human_gates:
  phone_patterns:
    - "phone number"
    - "mobile number"
    - "verify your phone"
    - "sms code"
  # Do NOT list bare "recaptcha" — SISU always loads the script
  captcha_block_patterns:
    - "solve this puzzle"
    - "select all images"
    - "unusual traffic"
onboarding:
  skip_texts:
    - "Skip"
    - "Not now"
    - "I'll do this later"
    - "Continue"
    - "Get started"
    - "Next"
token:
  settings_paths:
    - "/settings/user"
    - "/settings/account"
    - "/#setting/account"
  developer_texts:
    - "Developer"
    - "Access tokens"
    - "Personal access tokens"
  generate_texts:
    - "Generate new token"
    - "Generate token"
    - "Create token"
  token_comment: "grok-auto-register-dbx"
